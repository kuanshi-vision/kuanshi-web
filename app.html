<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宽石网 Web App | AI 视觉工作站</title>
    <script src="https://cdn.staticfile.org/tailwindcss@2.2.19/tailwind.min.js"></script>
    <link href="https://cdn.staticfile.org/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .blue-gradient { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        
        /* 视频区域优化 */
        .video-container { height: calc(100vh - 40px); position: relative; overflow: hidden; border-radius: 1.5rem; background: #000; }
        .main-video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }
        .low-res { filter: blur(10px) saturate(0.5); }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .upload-progress { transition: width 0.3s ease; }
    </style>
</head>
<body class="h-screen flex p-5 gap-5">

    <!-- 左侧导航栏 -->
    <aside class="w-64 glass-dark rounded-[2rem] flex flex-col p-6 z-50">
        <div class="text-2xl font-black text-blue-500 mb-10 tracking-tighter">宽石网</div>
        
        <nav class="flex-1 space-y-4">
            <a href="#" class="flex items-center space-x-3 p-3 rounded-xl bg-blue-600 text-white font-bold transition">
                <span>🏠</span> <span>推荐流</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/10 text-gray-400 hover:text-white transition">
                <span>🔥</span> <span>热门趋势</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-white/10 text-gray-400 hover:text-white transition">
                <span>👤</span> <span>我的作品</span>
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-white/10">
            <button onclick="openUpload()" class="w-full py-3 rounded-xl blue-gradient font-bold text-sm hover:scale-105 transition">
                + 上传视频
            </button>
        </div>
    </aside>

    <!-- 中间主内容区 (视频流) -->
    <main class="flex-1 flex flex-col gap-4">
        <div class="video-container shadow-2xl relative">
            <video id="main-video" class="main-video low-res" autoplay muted loop playsinline>
                <source src="https://cdn.pixabay.com/video/2020_04_16-13_14_24-23253_480p_alt_type_video.mp4" type="video/mp4">
            </video>
            
            <!-- AI Boost 悬浮按钮 -->
            <div class="absolute right-6 top-1/2 transform -translate-y-1/2 z-20">
                <button onclick="toggleBoost()" class="ai-boost-btn p-4 rounded-full blue-gradient shadow-lg hover:scale-110 transition animate-bounce">
                    <span class="font-bold text-xs">🪄 AI Boost</span>
                </button>
            </div>

            <!-- 底部视频信息 -->
            <div class="absolute bottom-0 left-0 w-full p-8 bg-gradient-to-t from-black to-transparent z-10">
                <div class="flex items-center space-x-3 mb-2">
                    <img src="https://i.pravatar.cc/100?img=1" class="w-10 h-10 rounded-full border-2 border-blue-500">
                    <span class="font-bold">@AI_Visionary</span>
                </div
                <p class="text-gray-300 text-sm max-w-md">探索 8K 超分辨率的极致纯净，宽石网让每一帧都成为艺术。#AI视觉 #8K</p>
            </div>
        </div

        <!-- 视频控制按钮 -->
        <div class="flex justify-center space-x-4 py-2">
            <button onclick="prevVideo()" class="px-6 py-2 rounded-full glass-dark hover:bg-white/20 transition">上一个</button>
            <button onclick="nextVideo()" class="px-6 py-2 rounded-full glass-dark hover:bg-white/20 transition">下一个</button>
        </div>
    </main>

    <!-- 右侧社交面板 -->
    <aside class="w-80 glass-dark rounded-[2rem] flex flex-col overflow-hidden z-50">
        <div class="p-6 border-b border-white/10">
            <h3 class="font-bold text-lg">实时对话</h3>
        </div>
        
        <!-- 聊天内容区 -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm">
            <div class="flex space-x-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex-shrink-0"></div>
                <div class="bg-white/10 p-3 rounded-2xl rounded-tl-none">
                    <p class="font-bold text-blue-400 text-xs">系统管理员</p>
                    <p>欢迎来到宽石 Web 版！尝试点击 AI Boost 按钮 🪄</p>
                </div>
            </div>
        </div>

        <!-- 聊天输入框 -->
        <div class="p-4 bg-black/20 flex space-x-2">
            <input id="chat-input" type="text" placeholder="输入消息..." class="flex-1 bg-white/10 border border-white/20 rounded-full px-4 py-2 text-sm outline-none focus:border-blue-500">
            <button onclick="sendMsg()" class="bg-blue-600 p-2 rounded-full hover:bg-blue-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </button>
        </div>
    </aside>

    <!-- 上传模拟弹窗 -->
    <div id="upload-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center">
        <div class="glass-dark w-full max-w-md p-10 rounded-[3rem] text-center">
            <h2 class="text-2xl font-bold mb-6">上传至宽石云</h2>
            <div class="border-2 border-dashed border-blue-500/30 p-10 rounded-3xl mb-6 cursor-pointer hover:bg-blue-500/10 transition" onclick="simulateUpload()">
                <div class="text-4xl mb-4">📁</div>
                <p class="text-gray-400 text-sm">点击或拖拽视频文件到此处</p>
            </div>
            <div id="upload-status" class="hidden">
                <div class="w-full bg-gray-700 h-2 rounded-full mb-4 overflow-hidden">
                    <div id="progress-bar" class="upload-progress h-full bg-blue-500 w-0"></div>
                </div>
                <p id="progress-text" class="text-xs text-blue-400 animate-pulse">正在进行 AI 8K 增强处理...</p>
            </div>
            <button onclick="closeUpload()" class="mt-6 text-gray-500 text-xs hover:text-white">取消上传</button>
        </div>
    </div>

    <script>
        // 视频库
        const videos = [
            "https://cdn.pixabay.com/video/2020_04_16-13_14_24-23253_480p_alt_type_video.mp4",
            "https://cdn.pixabay.com/video/2023_05_23/17/53/25-6222-dl.mp4",
            "https://cdn.pixabay.com/video/2021_05_03/16/43/210154-5C6001736_480p.mp4"
        ];
        let currentIdx = 0;

        function nextVideo() {
            currentIdx = (currentIdx + 1) % videos.length;
            updateVideo();
        }
        function prevVideo() {
            currentIdx = (currentIdx - 1 + videos.length) % videos.length;
            updateVideo();
        }
        function updateVideo() {
            const vid = document.getElementById('main-video');
            vid.src = videos[currentIdx];
            vid.classList.add('low-res'); // 每次切视频重置为低画质
            vid.play();
        }

        function toggleBoost() {
            document.getElementById('main-video').classList.toggle('low-res');
        }

        function toggleComments() {
            // This is for demo, in app version we focus on the chat panel
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            const box = document.getElementById('chat-box');
            box.innerHTML += `
                <div class="flex space-x-3 justify-end">
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none text-sm">
                        <p>${input.value}</p>
                    </div>
                </div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }

        function openUpload() { document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeUpload() { document.getElementById('upload-modal').classList.add('hidden'); }

        function simulateUpload() {
            const status = document.getElementById('upload-status');
            const bar = document.getElementById('progress-bar');
            status.classList.remove('hidden');
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('progress-text').innerText = "上传成功！视频已增强至 8K";
                    setTimeout(() => { closeUpload(); status.classList.add('hidden'); bar.style.width = '0%'; }, 2000);
                } else {
                    width += 2;
                    bar.style.width = width + '%';
                }
            }, 50);
        }
    </script>
</body>
</html>
